<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Planner — Balafama Jamabo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000; color: #f5f5f7; padding-top: 48px;
        }
        nav {
            background: rgba(22, 22, 23, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            position: fixed; top: 0; width: 100%; z-index: 9999; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-container {
            max-width: 1024px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 48px; padding: 0 22px;
        }
        .nav-logo { font-weight: 600; font-size: 14px; color: #f5f5f7; text-decoration: none; }
        .nav-links a { color: rgba(245, 245, 247, 0.8); text-decoration: none; font-size: 12px; margin-left: 22px; }
        .nav-links a:hover, .nav-links a.active { color: #ffffff; }

        .container { max-width: 600px; margin: 60px auto; padding: 0 22px; }
        h1 { font-size: 40px; font-weight: 700; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #86868b; font-size: 17px; margin-bottom: 40px; text-align: center; }

        .planner-card { background: #161617; padding: 30px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); }
        .input-group { display: flex; gap: 10px; margin-bottom: 24px; }
        input[type="text"] {
            flex: 1; background-color: #323236; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 12px; color: #ffffff; font-size: 15px; outline: none;
        }
        input[type="text"]:focus { border-color: #2997ff; }
        button.add-btn {
            background-color: #2997ff; color: #fff; border: none; padding: 0 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
        button.add-btn:hover { background-color: #0077ed; }

        ul.task-list { list-style: none; }
        li.task-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #2c2c2e; padding: 14px 18px; border-radius: 8px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .task-text { font-size: 15px; color: #ffffff; cursor: pointer; transition: color 0.2s; }
        .task-item.completed .task-text { text-decoration: line-through; color: #86868b; }
        .delete-btn {
            background: none; border: none; color: #ff453a; font-size: 14px; cursor: pointer; font-weight: 500;
        }
        .delete-btn:hover { text-decoration: underline; }

        footer { background-color: #161617; padding: 30px 22px; text-align: center; font-size: 12px; color: #86868b; margin-top: 100px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Balafama Jamabo</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About Me</a>
                <a href="projects.html">Projects</a>
                <a href="planner.html" class="active">Academic Planner</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1>Academic Task Planner</h1>
        <p class="subtitle">Interactive system engineered to manage course schedules.</p>

        <div class="planner-card">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Enter academic task profile...">
                <button class="add-btn" onclick="addTask()">Add Task</button>
            </div>

            <ul id="taskList" class="task-list">
                </ul>
        </div>
    </main>

    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            if (taskText === '') return;

            const ul = document.getElementById('taskList');
            const li = document.createElement('li');
            li.className = 'task-item';

            const span = document.createElement('span');
            span.className = 'task-text';
            span.innerText = taskText;
            span.onclick = function() {
                li.classList.toggle('completed');
            };

            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.innerText = 'Delete';
            delBtn.onclick = function() {
                ul.removeChild(li);
            };

            li.appendChild(span);
            li.appendChild(delBtn);
            ul.appendChild(li);

            input.value = '';
        }

        // Initialize with default template items
        window.onload = function() {
            document.getElementById('taskInput').value = "Complete COS 106 Assignment Submission";
            addTask();
        };
    </script>

    <footer>
        <p>&copy; 2026 MIVA Open University. All Rights Reserved | Balafama Jamabo Profile Submission</p>
    </footer>

</body>
</html>
